    ru: "Нет соединения"
    fa: "متصل نیست"
    zh: "未连接"
    pronunciation_context: adjective
    max_utterance_length_ms: 900
    interruption_behavior: queue
    verified: false

  c1.connecting.label:
    en: "Connecting"
    ru: "Подключение"
    fa: "در حال اتصال"
    zh: "正在连接"
