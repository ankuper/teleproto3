  # ===== Companion glyph / pairing flow =====
  # story 4.x: BLE handshake prompt during companion-device pairing.

  ble.handshake.prompt:
    en: "Hold your phone near the other device"
    ru: "Поднесите телефон ближе к другому устройству"
    fa: "تلفن خود را نزدیک دستگاه دیگر نگه دارید"
    zh: "请将手机靠近另一台设备"
    pronunciation_context: verb_imperative
    max_utterance_length_ms: 2400
    interruption_behavior: queue
    verified: false

  # ===== Tier-3 toast (UX-DR30) =====
  # story 2.6: the ONLY Type3-specific user-visible copy.
  # j4 = AR-J4 (operator-artefact catalogue, item 4 toast template).

  j4.tier3.toast:
    en: "Connection unstable. Tap to choose a different server or use direct connection."
    ru: "Соединение нестабильно. Нажмите, чтобы выбрать другой сервер или прямое подключение."
    fa: "اتصال ناپایدار است. برای انتخاب سرور دیگر یا اتصال مستقیم، ضربه بزنید."
    zh: "连接不稳定。点击以选择其他服务器或直接连接。"
    pronunciation_context: other
    max_utterance_length_ms: 4500
    interruption_behavior: preempt
    verified: false

