    zh: "连接不稳定。点击以选择其他服务器或直接连接。"

  # story 2.6 (via story 2.4 Dev Notes): single tappable action label on tier-3 toast.
  ui.tier3-action-switch:
    en: "Choose"
    ru: "Выбрать"
    fa: "انتخاب"
    zh: "选择"

  # story 2.6 (via story 2.4 PREREQUISITE): shown when OS-native secure storage is unavailable.
