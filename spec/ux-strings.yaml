# ux-strings.yaml — canonical user-facing strings for Type3 clients.
# Normative: translation keys are stable across MINOR releases.
# Key renames or removals require a MAJOR spec bump.
#
# Locales tracked: en, ru, fa, zh. All four are required at compliance
# level Full; missing locale = hard fail (spec-a11y-strings.yml).
#
# Every entry MUST carry a screen-reader metadata block per
# ux-conformance.md §8. `verified: false` until a native reviewer
# audits the translation.
#
# AR-C1 ban list — no entry in any locale may contain the seven literal
# tokens (Latin / Cyrillic / Persian / Han). Case-insensitive substring
# match (style-guide §8 / UX-DR24). The token table is enumerated inside
# the ban-list-doc sentinel in ux-conformance.md §7.

spec_version: 0.1.0-draft
last_updated: 2026-05-14

strings:

  # ===== C1 indicator labels (UX-DR20 + UX-DR34) =====
