# docker-compose.e2e.yml — CI-isolated test stack for Story 4.10 E2E smoke test
#
# Spins up teleproxy on 127.0.0.1:3130 (WS) and 127.0.0.1:8888 (stats) with a
# fixed test secret. No nginx — tests go directly to teleproxy.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml up -d
#   TELEPROXY_PORT=3130 STATS_PORT=8888 bash e2e-smoke.sh
#   docker compose -f docker-compose.e2e.yml down

services:
  teleproxy:
    image: ghcr.io/ankuper/teleproxy:ws-latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: teleproxy-e2e
    network_mode: host
    environment:
      # Fixed test secret — 32 hex chars (not a real deployment secret)
      - SECRET=00112233445566778899aabbccddeeff
      - PORT=3130
      - STATS_PORT=8888
      - DIRECT_MODE=true
      - WORKERS=1
      # PROXY_PROTOCOL disabled by default — E2E test enables it via env if needed
      - PROXY_PROTOCOL=${PROXY_PROTOCOL:-false}
    restart: "no"            # CI: do not restart on failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/stats || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
