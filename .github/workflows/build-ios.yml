name: Build iOS prebuilt

on:
  push:
    tags: ['lib-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Sparse-checkout BoringSSL from Telegram-iOS
        run: |
          git clone \
            --depth=1 \
            --no-checkout \
            https://github.com/ankuper/Telegram-iOS.git \
            /tmp/tg-ios
          cd /tmp/tg-ios
          git sparse-checkout set third-party/boringssl
          git checkout
          [[ -f "third-party/boringssl/CMakeLists.txt" ]] || {
            echo "error: third-party/boringssl/CMakeLists.txt not found" >&2
            exit 1
          }
          echo "BoringSSL source OK"

      - name: Build BoringSSL for iOS
        run: |
          chmod +x ci/build-boringssl-ios.sh
          ci/build-boringssl-ios.sh \
            --src /tmp/tg-ios/third-party/boringssl \
            --out /tmp/boringssl-ios

      - name: Build iOS artifacts (BoringSSL-linked)
        run: |
          chmod +x ci/build-ios.sh
          ci/build-ios.sh \
            --openssl-root /tmp/boringssl-ios \
            --out /tmp/t3-ios-out

      - name: Pack artifacts
        run: |
          cd /tmp/t3-ios-out
          # device
          mkdir -p stage-device/lib
          cp device-arm64/libteleproto3.a stage-device/lib/
          cp -r device-arm64/include stage-device/lib/include
          # Bake T3_SHIM_SOCKS5_AVAILABLE=1 into the shipped header so Bazel
          # consumers (no CMake target propagation) see the correct value.
          sed -i '' 's/T3_SHIM_SOCKS5_AVAILABLE 0/T3_SHIM_SOCKS5_AVAILABLE 1/' \
            stage-device/lib/include/t3_features.h
          tar czf libteleproto3-ios-arm64.tar.gz -C stage-device .
          # simulator
          mkdir -p stage-sim/lib
          cp simulator/libteleproto3.a stage-sim/lib/
          cp -r simulator/include stage-sim/lib/include
          sed -i '' 's/T3_SHIM_SOCKS5_AVAILABLE 0/T3_SHIM_SOCKS5_AVAILABLE 1/' \
            stage-sim/lib/include/t3_features.h
          tar czf libteleproto3-ios-simulator.tar.gz -C stage-sim .

      - name: Upload artifact (device)
        uses: actions/upload-artifact@v4
        with:
          name: libteleproto3-ios-arm64
          path: /tmp/t3-ios-out/libteleproto3-ios-arm64.tar.gz
          if-no-files-found: error

      - name: Upload artifact (simulator)
        uses: actions/upload-artifact@v4
        with:
          name: libteleproto3-ios-simulator
          path: /tmp/t3-ios-out/libteleproto3-ios-simulator.tar.gz
          if-no-files-found: error

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF##*/}
          # Create release if it doesn't exist yet (lib job may race us).
          gh release create "$TAG" --title "$TAG" 2>/dev/null || true
          gh release upload "$TAG" /tmp/t3-ios-out/libteleproto3-ios-arm64.tar.gz \
            --repo "${{ github.repository }}" --clobber
          gh release upload "$TAG" /tmp/t3-ios-out/libteleproto3-ios-simulator.tar.gz \
            --repo "${{ github.repository }}" --clobber
