# banner-discipline.yml — CI fails if any new/modified file under
# lib/src/ or spec/*.md lacks the required banner (Paige's rule).
#
# Canonical banner text:
#   lib/src/*.c → C block comment: "This is a reference implementation ...
#                  spec/ wins. File a bug or errata at ..."
#   spec/*.md   → Markdown blockquote: "Normative. This document defines
#                  required behaviour ... this document and lib/ differ,
#                  this document wins."
#
# TODO(spec-v0.1.0): switch to diff-scoped check once the tree has real
# files (checking touched files only, not the whole tree).
name: banner-discipline

on:
  push:
    branches: [main]
    paths:
      - 'lib/src/**'
      - 'lib/include/**'
      - 'spec/**'
      - '.github/workflows/banner-discipline.yml'
  pull_request:
    paths:
      - 'lib/src/**'
      - 'lib/include/**'
      - 'spec/**'
      - '.github/workflows/banner-discipline.yml'

# Explicit permissions block per style-guide §13.
# banner-discipline reads source files only — contents: read is sufficient.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check lib/src/*.c banner
        # P8: `set -e` so any unexpected failure aborts the step rather
        # than falling through to a green CI; `nullglob` so an empty
        # directory yields zero iterations instead of a literal
        # `lib/src/*.c` token; explicit empty-tree assertion is INTENTIONALLY
        # OMITTED here because lib/src/ is allowed to be empty pre-Story 1-3.
        # Once any .c lands the loop still enforces the banner per file.
        run: |
          set -euo pipefail
          shopt -s nullglob
          missing=0
          for f in lib/src/*.c; do
            if ! head -n 6 "$f" | grep -q 'reference implementation of the Type3 protocol'; then
              echo "::error file=$f::missing reference-implementation banner"
              missing=1
            fi
          done
          exit $missing
      - name: Check spec/*.md banner
        # P8: `set -e` + `nullglob`. spec/ MUST contain at least one .md
        # file once Story 1-2 lands; until then an empty match is allowed.
        # CHANGELOG.md is a non-normative metadocument — excluded.
        # head -30 accommodates files with long YAML frontmatter.
        run: |
          set -euo pipefail
          shopt -s nullglob
          missing=0
          for f in spec/*.md; do
            base="$(basename "$f")"
            case "$base" in CHANGELOG.md) continue ;; esac
            if ! head -n 30 "$f" | grep -q '\*\*Normative\.\*\*'; then
              echo "::error file=$f::missing normative banner"
              missing=1
            fi
          done
          exit $missing
      - name: Check lib/include/*.h banner
        # Non-recursive: checks only lib/include/*.h, NOT lib/include/internal/.
        # P8: `set -e` + `nullglob`; ALSO assert at-least-one match because
        # t3.h MUST exist by Story 1-6 — a missing public header is a
        # silent regression we never want to ship.
        run: |
          set -euo pipefail
          shopt -s nullglob
          headers=(lib/include/*.h)
          if [ "${#headers[@]}" -eq 0 ]; then
            echo "::error::lib/include/*.h is empty — public header (t3.h) is required after Story 1-6"
            exit 1
          fi
          missing=0
          for f in "${headers[@]}"; do
            if ! head -n 12 "$f" | grep -q 'reference implementation of the Type3 protocol'; then
              echo "::error file=$f::missing reference-implementation banner"
              missing=1
            fi
          done
          exit $missing
