# banner-discipline.yml — check normative 5-line C banner on library sources.
#
# This is the reference implementation of the Type3 protocol.
# Normative behaviour is defined in spec/. Where they differ, spec/ wins.
#
# Source: story 1.7 routing-fix item #2 + docs/epic-1-style-guide.md §8.
# Extends to lib/include/internal/*.h per 1-6 code review deferred item.

name: Banner Discipline

on:
  pull_request:
    paths:
      - 'lib/src/**'
      - 'lib/include/**'
  push:
    branches: [main]
    paths:
      - 'lib/src/**'
      - 'lib/include/**'

permissions:
  contents: read

jobs:
  banner-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check banners in lib/src/*.c
        run: |
          fail=0
          for f in lib/src/*.c; do
            [ -f "$f" ] || continue
            if ! head -5 "$f" | grep -q 'reference implementation of the Type3 protocol'; then
              echo "FAIL: $f missing normative banner"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "PASS: lib/src/*.c banners OK"
          exit "$fail"

      - name: Check banners in lib/include/*.h
        run: |
          fail=0
          for f in lib/include/*.h; do
            [ -f "$f" ] || continue
            if ! head -10 "$f" | grep -q 'reference implementation\|Type3 protocol'; then
              echo "FAIL: $f missing normative banner"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "PASS: lib/include/*.h banners OK"
          exit "$fail"

      - name: Check banners in lib/include/internal/*.h
        run: |
          fail=0
          for f in lib/include/internal/*.h; do
            [ -f "$f" ] || continue
            # Skip non-source files like README.md or .gitkeep
            case "$f" in *.h) ;; *) continue ;; esac
            if ! head -10 "$f" | grep -q 'reference implementation\|Type3 protocol\|internal'; then
              echo "FAIL: $f missing normative banner"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "PASS: lib/include/internal/*.h banners OK"
          exit "$fail"
