name: build-lib

on:
  push:
    branches: [main]
    paths: ['lib/**', '.github/workflows/build-lib.yml']
    tags: ['lib-v*']
  pull_request:
    paths: ['lib/**', '.github/workflows/build-lib.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Linux: static .a for x86_64 + aarch64 (server, tdlib, tdesktop-linux) ────
  build-linux:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev zlib1g-dev python3-pytest python3-cryptography

      - name: Build libteleproto3
        run: |
          cmake -S lib -B lib/build -DCMAKE_BUILD_TYPE=Release -DT3_BUILD_CLIENT=ON -DT3_SHIM_SOCKS5=ON
          cmake --build lib/build -j$(nproc)

      - name: Run tests
        run: cd lib/build && ctest --output-on-failure

      - name: Package
        run: |
          ARCH=${{ matrix.arch }}
          # Mirror the source-tree layout consumers expect: lib/include, the
          # static lib under lib/, and the full spec/ tree (codegen inputs:
          # ux-strings.yaml, ux-tokens/, assets/). A consumer extracts to a
          # root and points LIBTELEPROTO3_ROOT at it — no source clone needed.
          mkdir -p dist/lib/include
          cp lib/build/libteleproto3.a dist/lib/
          cp lib/include/t3.h lib/include/t3_client.h lib/include/t3_shim_socks5.h dist/lib/include/
          # This build enabled T3_SHIM_SOCKS5; bake the availability flag into the
          # shipped feature header so prebuilt-artifact consumers (raw -I, no CMake
          # target) see T3_SHIM_SOCKS5_AVAILABLE=1 without a compile-time -D.
          sed 's/T3_SHIM_SOCKS5_AVAILABLE 0/T3_SHIM_SOCKS5_AVAILABLE 1/' lib/include/t3_features.h > dist/lib/include/t3_features.h
          cp -R spec dist/spec
          tar czf libteleproto3-linux-${ARCH}.tar.gz -C dist .
          echo "ASSET=libteleproto3-linux-${ARCH}.tar.gz" >> $GITHUB_ENV

      - name: Verify shim shipped in artifact (story 9.2 AC3)
        run: |
          T3_LIB_A=lib/build/libteleproto3.a \
          T3_FEATURES=dist/lib/include/t3_features.h \
            bash lib/tests/abi/shim_release_symbols_test.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libteleproto3-linux-${{ matrix.arch }}
          path: ${{ env.ASSET }}

  # ── macOS: static .a for arm64 + x86_64 ─────────────────────────────────────
  # Both built on macos-14 (Apple Silicon, fast queue). x86_64 is cross-compiled
  # via -DCMAKE_OSX_ARCHITECTURES=x86_64 + Rosetta x86_64 OpenSSL bottle.
  # macos-13 (Intel) was avoided: runners are being retired and queue for hours.
  build-macos:
    strategy:
      matrix:
        include:
          - arch: arm64
            cmake_arch_flags: ""
          - arch: x86_64
            cmake_arch_flags: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          brew install cmake openssl@3
          # pytest + cryptography power the SOCKS5 shim conformance/byte-shape
          # suites. Best-effort: the CMake registration skips them if absent, so
          # a pip hiccup never reds the release build (the C suites + symbol
          # check still gate).
          python3 -m pip install --break-system-packages -q pytest cryptography || true

      - name: Build libteleproto3
        run: |
          # For x86_64 cross-compile: the .a is a static archive — the compiler
          # needs only the OpenSSL HEADERS (arch-neutral C), not the arm64 .a libs.
          # CMake configure uses arm64 OpenSSL paths (they exist as files, so
          # find_package(OpenSSL) succeeds); tests are disabled because test
          # executables would need x86_64-compatible OpenSSL at link time.
          ARCH="${{ matrix.arch }}"
          OPENSSL_ROOT="$(brew --prefix openssl@3)"
          TESTS_FLAG=""
          [ "$ARCH" = "x86_64" ] && TESTS_FLAG="-DT3_BUILD_TESTS=OFF"
          cmake -S lib -B lib/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DT3_BUILD_CLIENT=ON \
            -DT3_SHIM_SOCKS5=ON \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT" \
            ${{ matrix.cmake_arch_flags }} \
            $TESTS_FLAG
          cmake --build lib/build -j$(sysctl -n hw.ncpu)

      - name: Run tests
        if: matrix.arch == 'arm64'
        run: cd lib/build && ctest --output-on-failure

      - name: Package
        run: |
          ARCH=${{ matrix.arch }}
          mkdir -p dist/lib/include
          cp lib/build/libteleproto3.a dist/lib/
          cp lib/include/t3.h lib/include/t3_client.h lib/include/t3_shim_socks5.h dist/lib/include/
          # This build enabled T3_SHIM_SOCKS5; bake the availability flag into the
          # shipped feature header so prebuilt-artifact consumers (raw -I, no CMake
          # target) see T3_SHIM_SOCKS5_AVAILABLE=1 without a compile-time -D.
          sed 's/T3_SHIM_SOCKS5_AVAILABLE 0/T3_SHIM_SOCKS5_AVAILABLE 1/' lib/include/t3_features.h > dist/lib/include/t3_features.h
          cp -R spec dist/spec
          tar czf libteleproto3-macos-${ARCH}.tar.gz -C dist .
          echo "ASSET=libteleproto3-macos-${ARCH}.tar.gz" >> $GITHUB_ENV

      - name: Verify shim shipped in artifact (story 9.2 AC3)
        run: |
          T3_LIB_A=lib/build/libteleproto3.a \
          T3_FEATURES=dist/lib/include/t3_features.h \
            bash lib/tests/abi/shim_release_symbols_test.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libteleproto3-macos-${{ matrix.arch }}
          path: ${{ env.ASSET }}

  # ── Windows: static teleproto3.lib (MSVC x64, /MT static CRT) ────────────────
  # Built with the static CRT (MultiThreaded) so it links cleanly against
  # tdesktop's /MT binaries — a /MD lib would trigger LNK2038 RuntimeLibrary
  # mismatch. OpenSSL is referenced by symbol only and resolved at the
  # consumer's final link against its own OpenSSL; we just need the headers here.
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC env (x64)
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Locate OpenSSL 3
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files\OpenSSL",
            "C:\Program Files\OpenSSL-Win64",
            "C:\OpenSSL-Win64",
            "C:\vcpkg\installed\x64-windows"
          )
          $found = $null
          foreach ($p in $candidates) {
            if (Test-Path "$p\include\openssl\opensslv.h") { $found = $p; break }
          }
          if (-not $found) { Write-Error "OpenSSL not located in any candidate path"; exit 1 }
          echo "OPENSSL_ROOT_DIR=$found" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "OPENSSL_ROOT_DIR=$found"

      - name: Build libteleproto3 (/MT)
        shell: cmd
        run: |
          cd lib
          cmake -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DT3_BUILD_CLIENT=ON ^
            -DT3_SHIM_SOCKS5=ON ^
            -DT3_BUILD_TESTS=OFF ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded ^
            -DOPENSSL_ROOT_DIR="%OPENSSL_ROOT_DIR%"
          cmake --build build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\lib\include | Out-Null
          Copy-Item lib\build\teleproto3.lib dist\lib\
          Copy-Item lib\include\t3.h,lib\include\t3_client.h,lib\include\t3_shim_socks5.h dist\lib\include\
          # This build enabled T3_SHIM_SOCKS5; bake the availability flag into the
          # shipped feature header so raw -I consumers see =1 without a compile -D.
          (Get-Content lib\include\t3_features.h) -replace 'T3_SHIM_SOCKS5_AVAILABLE 0','T3_SHIM_SOCKS5_AVAILABLE 1' | Set-Content dist\lib\include\t3_features.h
          Copy-Item -Recurse spec dist\spec
          Compress-Archive -Path dist\* -DestinationPath libteleproto3-windows-x86_64.zip -Force

      - name: Verify shim shipped in artifact (story 9.2 AC3)
        shell: pwsh
        run: |
          $h = Get-Content dist\lib\include\t3_features.h -Raw
          if ($h -notmatch 'T3_SHIM_SOCKS5_AVAILABLE 1') { Write-Error 'feature flag not baked to 1'; exit 1 }
          $syms = & dumpbin /SYMBOLS dist\lib\teleproto3.lib
          foreach ($s in 't3_shim_open','t3_shim_close','t3_shim_get_credentials','t3_shim_local_port') {
            if (-not ($syms -match "\b$s\b")) { Write-Error "symbol not exported: $s"; exit 1 }
          }
          Write-Host 'AC3 Windows: shim flag + t3_shim_* symbols present.'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libteleproto3-windows-x86_64
          path: libteleproto3-windows-x86_64.zip

  # ── Android: libteleproto3.a per ABI (arm64-v8a, armeabi-v7a, x86_64, x86) ──
  # Requires Telegram-Android's vendored BoringSSL — fetched via sparse-checkout
  # so that the prebuilt .a links cleanly against the app's own libcrypto/libssl.
  # The SOCKS5 shim (T3_SHIM_SOCKS5=ON) is included because teleproto3_jni.cpp
  # calls t3_shim_open/close/local_port/get_credentials at runtime.
  build-android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "21.4.7075529"
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      BORINGSSL_DIR: /tmp/tg-android/TMessagesProj/jni/boringssl
      OUT_DIR: /tmp/teleproto3-android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}"
          NDK_PATH="${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
          [[ -d "$NDK_PATH" ]] || { echo "error: NDK not found at $NDK_PATH" >&2; exit 1; }
          echo "NDK_ROOT=${NDK_PATH}" >> "$GITHUB_ENV"

      - name: Sparse-checkout BoringSSL from Telegram-Android
        run: |
          git clone \
            --depth=1 \
            --no-checkout \
            https://github.com/ankuper/Telegram-Android.git \
            /tmp/tg-android
          cd /tmp/tg-android
          git sparse-checkout set TMessagesProj/jni/boringssl
          git checkout
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            for lib in libssl.a libcrypto.a; do
              p="${BORINGSSL_DIR}/lib/${abi}/${lib}"
              [[ -f "$p" ]] || { echo "error: missing $p" >&2; exit 1; }
            done
          done
          echo "BoringSSL layout OK (all 4 ABIs)"

      - name: Build libteleproto3.a for Android ABIs
        run: |
          chmod +x ci/build-android.sh
          ci/build-android.sh \
            --ndk      "${NDK_ROOT}" \
            --boringssl "${BORINGSSL_DIR}" \
            --out      "${OUT_DIR}" \
            --abis     "arm64-v8a,armeabi-v7a,x86_64,x86"

      - name: Package Android archive
        run: |
          # Layout mirrors TMessagesProj/jni/teleproto3/ in Telegram-Android:
          #   {ABI}/libteleproto3.a
          # Headers are checked into the Android repo — not included here.
          cd "$OUT_DIR"
          zip -r /tmp/libteleproto3-android.zip arm64-v8a/ armeabi-v7a/ x86_64/ x86/
          ls -lh /tmp/libteleproto3-android.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libteleproto3-android
          path: /tmp/libteleproto3-android.zip
          if-no-files-found: error

  # ── Release: attach every platform's archive to the latest GitHub Release ────
  release:
    needs: [build-linux, build-macos, build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/lib-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          # Create the release for this tag if it doesn't exist yet (iOS job may race us).
          gh release create "$TAG" --title "$TAG" 2>/dev/null || true
          shopt -s nullglob
          for f in libteleproto3-*/libteleproto3-*.tar.gz libteleproto3-*/libteleproto3-*.zip; do
            NAME=$(basename "$f")
            # Replace any existing asset of the same name (re-runnable).
            ASSET_ID=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq ".assets[] | select(.name==\"$NAME\") | .id" 2>/dev/null || true)
            [ -n "$ASSET_ID" ] && gh api -X DELETE "repos/${{ github.repository }}/releases/assets/$ASSET_ID" 2>/dev/null || true
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}"
            echo "Uploaded $NAME to release $TAG"
          done
