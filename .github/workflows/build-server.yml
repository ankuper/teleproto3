# build-server.yml — triggered on server/** changes.
# Builds the multi-arch (amd64 + arm64) Docker image from server/ and
# publishes to ghcr.io/ankuper/teleproxy on push to main and on server-v* tags.
# PR triggers run a build-only sanity check (no push).
#
# Image canonical name: ghcr.io/ankuper/teleproxy
# Tag schema:
#   - ws-latest         (only on default branch)
#   - ws-<full-sha>     (every main push)
#   - server-v*         (only on tag refs)
name: build-server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'lib/**'   # lib changes invalidate the server's linked library
      - '.github/workflows/build-server.yml'
    tags:
      - 'server-v*'
  pull_request:
    paths:
      - 'server/**'
      - 'lib/**'
      - '.github/workflows/build-server.yml'

permissions:
  contents: read
  packages: write   # required for ghcr.io push via GITHUB_TOKEN

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ankuper/teleproxy
          tags: |
            type=raw,value=ws-latest,enable={{is_default_branch}}
            type=raw,value=ws-${{ github.sha }}
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          # Repo-root context: server/Dockerfile COPY's both `server/` and
          # `lib/` since server/Makefile links lib/build/libteleproto3.a via
          # T3_LIB_DIR=../lib. .dockerignore at the repo root keeps it lean.
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
