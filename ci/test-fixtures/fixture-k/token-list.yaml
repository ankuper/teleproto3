---
denylist:
  - id: deny-k1
    pattern: 'forbiddenword'
    description: 'Base denylist rule for overreach test'
    scope: both
allowlist:
  - id: allow-overbroad
    pattern: '.*word'
    scope: both
    description: 'Over-broad: matches both FP and real token under -x — must fail self-test'
    reason: 'Intentionally overbroad to trigger overreach detection: .*word matches both legitword and forbiddenword when anchored by grep -x'
    test_fp_example: 'legitword'
    test_denylist_token_example: 'forbiddenword'
